name: Marketing (Gold)
description: Marketing color scheme with gold
layers:
  # LN ridge — warm violet with gold overtone
  LN_RIDGE:
    Basic Color: [0.65, 0.55, 0.78, 1.0]
    Metallic: 0.3
    Roughness: 0.30

  # LN slab — deeper companion shade
  LN_SLAB:
    Basic Color: [0.52, 0.44, 0.66, 0.90]
    Alpha: 0.9
    Metallic: 0.3
    Roughness: 0.35

  # Etched slab — deep cool void for contrast
  SLAB_NEGATIVE:
    Basic Color: [0.08, 0.08, 0.12, 0.55]
    Alpha: 0.55
    Roughness: 0.55

  # Labels — warm muted brown
  LABELS:
    Basic Color: [0.40, 0.32, 0.22, 1.0]
    Roughness: 0.55

  # Chip outline — warm gold tint
  CHIP_CONTOUR:
    Basic Color: [0.96, 0.78, 0.45, 0.7]
    Alpha: 0.7
    Roughness: 0.6

  # Exclusion zone — soft amber
  CHIP_EXCLUSION_ZONE:
    Basic Color: [0.92, 0.72, 0.32, 0.35]
    Alpha: 0.35
    Roughness: 0.6

  # Electrodes — luxurious gold
  TL:
    Basic Color: [0.98, 0.82, 0.32, 1.0]
    Metallic: 0.90
    Roughness: 0.25

  # Heaters — darker antique gold
  HT:
    Basic Color: [0.72, 0.55, 0.20, 1.0]
    Metallic: 0.8
    Roughness: 0.35
