name: Marketing
description: Marketing color scheme
layers:
  # LN ridge — refined violet
  LN_RIDGE:
    Basic Color: [0.62, 0.52, 0.78, 1.0]
    Metallic: 0.3
    Roughness: 0.30

  # LN slab — deeper companion shade
  LN_SLAB:
    Basic Color: [0.50, 0.42, 0.68, 0.90]
    Alpha: 0.9
    Metallic: 0.3
    Roughness: 0.35

  # Etched slab — dark cool void
  SLAB_NEGATIVE:
    Basic Color: [0.10, 0.10, 0.16, 0.50]
    Alpha: 0.5
    Roughness: 0.55

  # Labels — soft slate
  LABELS:
    Basic Color: [0.30, 0.34, 0.42, 1.0]
    Roughness: 0.55

  # Chip outline — muted peach
  CHIP_CONTOUR:
    Basic Color: [0.95, 0.74, 0.68, 0.7]
    Alpha: 0.7
    Roughness: 0.65

  # Exclusion zone — soft teal
  CHIP_EXCLUSION_ZONE:
    Basic Color: [0.20, 0.78, 0.62, 0.35]
    Alpha: 0.35
    Roughness: 0.6

  # Electrodes — clean platinum
  TL:
    Basic Color: [0.86, 0.88, 0.92, 1.0]
    Metallic: 0.85
    Roughness: 0.25

  # Heaters — warm rose-gold accent
  HT:
    Basic Color: [0.78, 0.55, 0.45, 1.0]
    Metallic: 0.7
    Roughness: 0.40
