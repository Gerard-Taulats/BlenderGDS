name: Marketing (Gold)
description: Marketing color scheme with gold
layers:
  # Silicon — vibrant violet-grey
  Si:
    Base Color: [0.50, 0.40, 0.65, 1.0]
    Metallic: 0.6
    Roughness: 0.35
  SiRib90:
    Base Color: [0.40, 0.50, 0.70, 1.0]
    Metallic: 0.6
    Roughness: 0.35
  SiLitho193:
    Base Color: [0.62, 0.40, 0.62, 1.0]
    Metallic: 0.6
    Roughness: 0.35

  # SiN — clean teal
  SiN:
    Base Color: [0.55, 0.78, 0.78, 0.85]
    Roughness: 0.3

  # Doping — rich pink/violet
  SiNdope:
    Base Color: [0.65, 0.30, 0.55, 0.95]
    Metallic: 0.5
    Roughness: 0.4
  SiNppdope:
    Base Color: [0.40, 0.20, 0.65, 0.95]
    Metallic: 0.5
    Roughness: 0.4

  # Oxide opening — warm gold tint
  OxideOpen:
    Base Color: [0.98, 0.78, 0.30, 0.5]
    Metallic: 0.4
    Roughness: 0.3

  # Heater — gold accent
  M1Heater:
    Base Color: [0.92, 0.72, 0.22, 1.0]
    Metallic: 0.8
    Roughness: 0.3

  # VC — gold via
  VC:
    Base Color: [0.86, 0.62, 0.20, 1.0]
    Metallic: 0.8
    Roughness: 0.3

  # M2 routing — luxurious gold
  M2Router:
    Base Color: [0.98, 0.82, 0.32, 1.0]
    Metallic: 0.85
    Roughness: 0.25

  # Passivation opening — deep contrast
  MOpen:
    Base Color: [0.06, 0.06, 0.08, 0.9]
    Roughness: 0.55

  # Etches — cool dark contrast
  DeepTrench:
    Base Color: [0.04, 0.04, 0.06, 0.95]
    Roughness: 0.7
  IsolationTrench:
    Base Color: [0.10, 0.10, 0.12, 0.9]
    Roughness: 0.6
  ShelfEtch:
    Base Color: [0.30, 0.28, 0.26, 0.8]
    Roughness: 0.5
