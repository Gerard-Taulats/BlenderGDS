name: Marketing
description: Marketing color scheme
layers:
  # Silicon device layer (enhanced purple-grey)
  Si:
    Base Color: [0.48, 0.42, 0.55, 1.0]
    Metallic: 0.6
    Roughness: 0.35
  SiRib90:
    Base Color: [0.42, 0.46, 0.55, 1.0]
    Metallic: 0.6
    Roughness: 0.35
  SiLitho193:
    Base Color: [0.55, 0.42, 0.55, 1.0]
    Metallic: 0.6
    Roughness: 0.35

  # SiN — soft blue tint
  SiN:
    Base Color: [0.60, 0.72, 0.78, 0.85]
    Roughness: 0.3

  # Doping — subtle pink/violet
  SiNdope:
    Base Color: [0.55, 0.40, 0.55, 0.95]
    Metallic: 0.5
    Roughness: 0.45
  SiNppdope:
    Base Color: [0.40, 0.40, 0.70, 0.95]
    Metallic: 0.5
    Roughness: 0.45

  # Oxide opening — warm translucent
  OxideOpen:
    Base Color: [0.95, 0.78, 0.55, 0.4]
    Roughness: 0.25

  # Heater — warm metal
  M1Heater:
    Base Color: [0.78, 0.66, 0.40, 1.0]
    Metallic: 0.7
    Roughness: 0.4

  # VC — dark contrast tungsten
  VC:
    Base Color: [0.38, 0.40, 0.43, 1.0]
    Metallic: 0.8
    Roughness: 0.35

  # M2 routing — bright clean aluminum
  M2Router:
    Base Color: [0.78, 0.80, 0.84, 1.0]
    Metallic: 0.8
    Roughness: 0.25

  # Passivation opening
  MOpen:
    Base Color: [0.08, 0.08, 0.10, 0.9]
    Roughness: 0.55

  # Etches — cool darker tones
  DeepTrench:
    Base Color: [0.04, 0.04, 0.06, 0.95]
    Roughness: 0.7
  IsolationTrench:
    Base Color: [0.10, 0.10, 0.14, 0.90]
    Roughness: 0.6
  ShelfEtch:
    Base Color: [0.28, 0.30, 0.32, 0.8]
    Roughness: 0.5
