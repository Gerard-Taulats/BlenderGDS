name: Fancy
description: Fancy color scheme - vivid flat aesthetic
layers:
  # Silicon layers
  Comp:
    Basic Color: [0.10, 0.95, 0.25, 0.90]      # Bright green (active)
    Alpha: 0.9
    Metallic: 0.0
    Roughness: 1.0
  Nwell:
    Basic Color: [0.10, 0.30, 0.90, 0.65]      # Deep blue
    Alpha: 0.65
    Metallic: 0.0
    Roughness: 1.0
  Poly2:
    Basic Color: [0.95, 0.08, 0.08, 0.95]      # Vivid red (gate)
    Alpha: 0.95
    Metallic: 0.0
    Roughness: 1.0

  # Contacts & vias - bright white
  Contact:
    Basic Color: [1.0, 1.0, 1.0, 1.0]
    Metallic: 0.0
    Roughness: 1.0
  Via1:
    Basic Color: [1.0, 1.0, 1.0, 1.0]
    Metallic: 0.0
    Roughness: 1.0
  Via2:
    Basic Color: [1.0, 1.0, 1.0, 1.0]
    Metallic: 0.0
    Roughness: 1.0
  Via3:
    Basic Color: [1.0, 1.0, 1.0, 1.0]
    Metallic: 0.0
    Roughness: 1.0
  Via4:
    Basic Color: [1.0, 1.0, 1.0, 1.0]
    Metallic: 0.0
    Roughness: 1.0
  Via5:
    Basic Color: [1.0, 1.0, 1.0, 1.0]
    Metallic: 0.0
    Roughness: 1.0

  # Metal layers - vivid rainbow spectrum (Blue → Violet → Red → Orange → Yellow → Gold)
  Metal1:
    Basic Color: [0.15, 0.40, 1.0, 1.0]        # Blue
    Metallic: 0.0
    Roughness: 1.0
  Metal2:
    Basic Color: [0.55, 0.10, 1.0, 1.0]        # Violet
    Metallic: 0.0
    Roughness: 1.0
  Metal3:
    Basic Color: [1.0, 0.08, 0.08, 1.0]        # Red
    Metallic: 0.0
    Roughness: 1.0
  Metal4:
    Basic Color: [1.0, 0.52, 0.05, 1.0]        # Orange
    Metallic: 0.0
    Roughness: 1.0
  Metal5:
    Basic Color: [1.0, 0.95, 0.05, 1.0]        # Yellow
    Metallic: 0.0
    Roughness: 1.0
  MetalTop:
    Basic Color: [1.0, 0.78, 0.10, 1.0]        # Gold (bond-pad layer)
    Metallic: 0.0
    Roughness: 1.0
